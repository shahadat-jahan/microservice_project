services:
  # Auth Service
  auth_service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile
    container_name: auth_service
    volumes:
      - ./auth-service:/var/www
    networks:
      - micro-network

  # Order Service
  order_service:
    build:
      context: ./order-service
      dockerfile: ../Dockerfile
    container_name: order_service
    volumes:
      - ./order-service:/var/www
    networks:
      - micro-network

  # Nginx Gateway
  gateway:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - micro-network
  db:
    image: mysql:8.2
    container_name: master_db
    restart: on-failure
    environment:
      MYSQL_DATABASE: master_db
      MYSQL_ROOT_PASSWORD: 123456
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge
